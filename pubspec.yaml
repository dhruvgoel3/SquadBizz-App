name: squadbizz
description: "SquadBizz — Your squad, one place."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ── State management ──
  flutter_bloc: ^9.1.0
  equatable: ^2.0.5
  hydrated_bloc: ^10.0.0

  # ── Navigation ──
  go_router: ^15.1.2

  # ── Dependency injection ──
  get_it: ^8.0.3

  # ── Backend & auth ──
  supabase_flutter: ^2.8.4

  # ── Models (immutable + serialization) ──
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # ── UI & fonts ──
  google_fonts: ^6.2.1
  smooth_page_indicator: ^1.2.1
  another_flushbar: ^1.12.32

  # ── Phone input ──
  intl_phone_field: ^3.2.0

  # ── Local storage / caching ──
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5

  # ── UI effects ──
  shimmer: ^3.0.0

  # ── Sharing ──
  share_plus: ^10.1.4

  # ── Time formatting ──
  timeago: ^3.7.0

  # ── Responsive ──
  flutter_screenutil: ^5.9.3

  # ── Logging ──
  logger: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # ── Code generation ──
  build_runner: ^2.4.13
  freezed: ^3.0.6
  json_serializable: ^6.9.4

  # ── Testing ──
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
